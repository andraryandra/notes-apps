name: Release

# Release Please membuat tag + GitHub Release lewat API (bukan git push tag),
# jadi trigger `push: tags` saja tidak cukup — perlu `release: published`.
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag versi (mis. v1.2.1). Kosongkan = branch/tag saat ini.'
        required: false

permissions:
  contents: write

jobs:
  prepare:
    name: Generate icon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.version_tag || github.ref }}

      - name: Install rsvg
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate app icon
        run: bash scripts/generate-icons.sh

      - name: Upload icon
        uses: actions/upload-artifact@v4
        with:
          name: app-icon
          path: build/icon.png

  build:
    name: Build (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.version_tag || github.ref }}

      - name: Download icon
        uses: actions/download-artifact@v4
        with:
          name: app-icon
          path: build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify icon
        shell: bash
        run: test -f build/icon.png

      - name: Build renderer + Electron
        run: npm run build:bundle

      - name: Package and publish
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
